<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>arthurmorato.com</title>
    <meta name="description" content="Portfólio de Arthur Morato em estética de terminal." />
    <link rel="stylesheet" href="styles.css?v=20260310" />
  </head>
  <body>
    <div class="terminal-root">
      <header class="terminal-header">
        <div class="terminal-lights">
          <span class="light light-red"></span>
          <span class="light light-yellow"></span>
          <span class="light light-green"></span>
        </div>
        <div class="terminal-title">
          root@arthurmorato-dev:~ — arthurmorato.com
        </div>
      </header>

      <main class="terminal-body" aria-label="janela de terminal simulada">
        <section class="terminal-log" aria-live="polite">
          <p class="log-line">
            <span class="log-prefix">[INFO]</span>
            <span class="log-text">
              Inicializando ambiente remoto
              <span class="log-accent">arthurmorato.com</span>
              <span class="log-muted">// v1.0.0</span>
              ...
            </span>
          </p>
          <p class="log-line">
            <span class="log-prefix">[SUCCESS]</span>
            <span class="log-text">
              <span class="log-strong">Sessão estabelecida com sucesso</span>
              <span class="log-muted">// conectado como root</span>
            </span>
          </p>
          <p class="log-line">
            <span class="log-prefix">[INFO]</span>
            <span class="log-text">
              Carregando módulos:
              <span class="log-keyword">portfolio</span>,
              <span class="log-keyword">projects</span>,
              <span class="log-keyword">contact</span>
            </span>
          </p>
        </section>

        <section class="terminal-input" aria-label="linha de comando ativa">
          <span class="prompt">root@arthurmorato-dev:~#</span>
          <span class="input-buffer" id="animated-command" aria-label="comando animado"></span>
          <span class="input-caret" aria-hidden="true"></span>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
